name: Build Releases

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Run build script
        run: |
          python build/build_release.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unihorario-dist
          path: dist/

  build-windows:
    runs-on: windows-latest
    if: false # activable manualmente si se desea (requiere testing)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Run PyInstaller
        run: |
          python -m PyInstaller --onefile --name UniHorarioUSS_windows launcher_desktop.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unihorario-windows
          path: dist/
