name: Build Releases

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ clean-release ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install --upgrade setuptools wheel
      - name: Show Python & pip info
        run: |
          python -V
          pip -V
          pip list --format=columns
      - name: Run build script
        run: |
          python build/build_release.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unihorario-dist
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Run build script (Windows)
        run: |
          set -o pipefail
          python build/build_release.py 2>&1 | tee build_windows_output.txt
      - name: Upload build logs (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: build_windows_output.txt
      - name: Show build log in job output
        if: always()
        run: |
          echo "==== BUILD LOG START ===="
          type build_windows_output.txt || echo "(no build log)"
          echo "==== BUILD LOG END ===="
      - name: Read version
        id: get_version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
      - name: Commit built exe and VERSION back to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/* VERSION || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(release): add windows build UniHorarioUSS_v${{ steps.get_version.outputs.version }} [skip ci]"
            git push origin HEAD:clean-release
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unihorario-windows
          path: dist/
